name: Deploy Backend to Cloud Foundry

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-be-${{ github.ref }}
  cancel-in-progress: false 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cloud Foundry CLI v8
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" -o cf.tgz
          tar -xzf cf.tgz cf8
          sudo mv cf8 /usr/local/bin/cf
          cf version

      - name: Authenticate to Cloud Foundry
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_ORIGIN: ${{ secrets.CF_ORIGIN }}
        run: |
          cf api "$CF_API"
          if [ -n "$CF_ORIGIN" ]; then
            cf auth "$CF_USERNAME" "$CF_PASSWORD" --origin "$CF_ORIGIN"
          else
            cf auth "$CF_USERNAME" "$CF_PASSWORD"
          fi
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      - name: Verify xsuaa service exists
        run: |
          cf service btp-copilot-xsuaa > /dev/null || {
            echo "::error::Service 'btp-copilot-xsuaa' not found in this space. Create it once before deploying.";
            exit 1;
          }

      - name: Deploy (cf push)
        run: cf push -f manifest.yml

      - name: Logout
        if: always()
        run: cf logout
