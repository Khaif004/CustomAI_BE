---
applications:
  - name: btp-copilot-backend
    memory: 1G
    disk_quota: 2G
    buildpacks:
      - python_buildpack
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    health-check-type: http
    health-check-http-endpoint: /health
    services:
      - btp-copilot-xsuaa
